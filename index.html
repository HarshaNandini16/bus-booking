<!DOCTYPE html>
<html>
<head>
    <title>GoBus - Book Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>🚌 GoBus</h2>
</div>

<!-- Search -->
<div class="search">
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">
    <button onclick="searchBus()">Search</button>
</div>

<!-- Bus Results -->
<div id="busList"></div>

<!-- Seat Layout -->
<h2>Select Your Seats</h2>
<div id="busLayout"></div>

<button class="book-btn" onclick="bookTicket()">Confirm Booking</button>

<!-- Ticket -->
<div id="ticket"></div>

<!-- History -->
<h2>Booking History</h2>
<div id="history"></div>

<script src="script.js"></script>
</body>
</html>
